<!DOCTYPE html>
<html>
<head>
  <title>My Profile</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ===== MODAL ===== */
#deleteModal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);

  display:none; /* hidden by default */
  align-items:center;
  justify-content:center;

  z-index:9999;
}

#deleteModal.active{
  display:flex;
}

.modal-box{
  width:300px;
  background:#020617;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

.modal-box button{
  width:100%;
  margin-top:10px;
}
  </style>
</head>
<body>

<!-- ===== HEADER ===== -->
<div class="header">
  <h1>👤 My Profile</h1>

  <div>
    <a class="add-btn" href="home.html">⬅ Back</a>
  </div>
</div>

<!-- ===== USER INFO ===== -->
<div id="userInfo" style="max-width:800px;margin:120px auto 20px auto;"></div>

<!-- ===== USER STORIES ===== -->
<div id="myStories" style="max-width:800px;margin:auto;"></div>


<!-- DELETE MODAL -->
<div id="deleteModal" class="modal-hidden">
  <div class="modal-box">
    <h3>Delete Story</h3>
    <p>This action cannot be undone.</p>

    <button id="confirmDelete">Delete</button>
    <button id="cancelDelete">Cancel</button>
  </div>
</div>


<script src="js/profileDashboard.js"></script>

</body>
</html>
